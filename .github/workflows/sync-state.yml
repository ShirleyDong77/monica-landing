name: Sync Monica State

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'Monica state JSON'
        required: true
        type: string
  schedule:
    - cron: '*/5 * * * *'

jobs:
  update-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Update state
        run: |
          if [ -n "${{ github.event.inputs.state }}" ]; then
            echo '${{ github.event.inputs.state }}' > monica-state.json
          else
            echo '{"name":"Monica","state":"idle","detail":"状态同步中...","updated":"'${{ github.event.inputs.state }}'"}' > monica-state.json
          fi
          echo "State file updated at $(date)"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monica-state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync state $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
